# =============================================================================
# FS25 Farm Planner - configuracion nginx
# -----------------------------------------------------------------------------
# - Sirve la SPA Nuxt (estatica) con fallback a /index.html.
# - Hace proxy de /api/ hacia el contenedor "api" (Fastify, puerto 3000).
# - Anade cabeceras de seguridad y compresion gzip.
# - Bloque TLS (443) preparado pero comentado.
# =============================================================================

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # --- Logging -------------------------------------------------------------
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;

    # --- Rendimiento ---------------------------------------------------------
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    server_tokens      off;

    # Permite subir savegames/JSON de importacion sin un 413 prematuro (H8).
    client_max_body_size 10m;

    # --- Compresion ----------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml
        font/ttf
        font/otf
        font/woff
        font/woff2;
    # Nota: para mejor ratio se puede anadir compresion brotli si la imagen de
    # nginx incluye el modulo ngx_brotli (no presente en nginx:alpine estandar):
    #   brotli            on;
    #   brotli_comp_level 6;
    #   brotli_types      text/css application/javascript application/json image/svg+xml;

    # --- Upstream de la API --------------------------------------------------
    upstream fs25_api {
        server api:3000;
        keepalive 32;
    }

    # =========================================================================
    # Servidor HTTP (puerto 80)
    # =========================================================================
    server {
        listen       80;
        listen       [::]:80;
        server_name  _;

        root   /usr/share/nginx/html;
        index  index.html;

        # --- Cabeceras de seguridad (aplicadas a todas las respuestas) -------
        # CSP para una SPA que solo habla con su propio origen (/api via proxy).
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # --- Proxy a la API --------------------------------------------------
        # /api/v1/health, /api/v1/... -> http://api:3000/api/...
        location /api/ {
            proxy_pass         http://fs25_api/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_read_timeout 60s;
        }

        # --- Assets de Nuxt con hash: cache agresiva (inmutables) ------------
        location /_nuxt/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
            try_files $uri =404;
        }

        # --- SPA: fallback a index.html para rutas del cliente ---------------
        location / {
            try_files $uri $uri/ /index.html;
        }

        # index.html nunca debe cachearse (apunta a los assets versionados).
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        }
    }

    # =========================================================================
    # Servidor HTTPS (puerto 443) - PREPARADO, COMENTADO
    # -------------------------------------------------------------------------
    # Para habilitar TLS:
    #   1) Montar certificados en /etc/nginx/certs (volumen en docker-compose).
    #   2) Publicar "443:443" en el servicio nginx del docker-compose.
    #   3) Descomentar este bloque y, opcionalmente, redirigir 80 -> 443.
    # =========================================================================
    # server {
    #     listen       443 ssl;
    #     listen       [::]:443 ssl;
    #     http2        on;
    #     server_name  _;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     ssl_session_cache   shared:SSL:10m;
    #     ssl_session_timeout 1d;
    #
    #     root   /usr/share/nginx/html;
    #     index  index.html;
    #
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #     add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    #     add_header X-Content-Type-Options "nosniff" always;
    #     add_header X-Frame-Options "DENY" always;
    #     add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    #
    #     location /api/ {
    #         proxy_pass         http://fs25_api/api/;
    #         proxy_http_version 1.1;
    #         proxy_set_header   Host              $host;
    #         proxy_set_header   X-Real-IP         $remote_addr;
    #         proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    #         proxy_set_header   X-Forwarded-Proto $scheme;
    #         proxy_set_header   Connection        "";
    #     }
    #
    #     location /_nuxt/ {
    #         expires 1y;
    #         add_header Cache-Control "public, immutable";
    #         access_log off;
    #         try_files $uri =404;
    #     }
    #
    #     location / {
    #         try_files $uri $uri/ /index.html;
    #     }
    # }
