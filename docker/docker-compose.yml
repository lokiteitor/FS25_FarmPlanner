# =============================================================================
# FS25 Farm Planner - Docker Compose
# -----------------------------------------------------------------------------
# Despliega el sistema completo detras de nginx (proxy inverso + estaticos).
# Solo nginx publica puertos al host; api/worker/postgres/redis viven en la red
# interna "fs25net" y NO se exponen al exterior (principio de minimo privilegio,
# ver docs/arquitectura-api.md  9).
#
# Uso (produccion / despliegue local completo):
#   cp .env.example .env        # ajustar POSTGRES_PASSWORD, JWT_SECRET, etc.
#   docker compose -f docker/docker-compose.yml up --build
#
# Notas:
#   - Compose v2: no se necesita la clave "version" (obsoleta).
#   - DESARROLLO: para iterar sobre el codigo se recomienda ejecutar api (tsx)
#     y web (nuxt dev) en local con hot-reload; este compose construye imagenes
#     de produccion. Postgres y Redis de este compose pueden reutilizarse en dev
#     publicando temporalmente sus puertos en un archivo override no commiteado.
#   - Las migraciones y el seed se ejecutan en el arranque del servicio "api"
#     (ver su "command"). Los ficheros dist/db/migrate.js y dist/db/seed.js se
#     anaden en H2 (compilados desde src/db/*.ts). Hasta entonces, el comando
#     puede fallar de forma controlada y debe ajustarse al cerrar H2.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 18 - persistencia (PK uuidv7() nativo, ver ADR-008)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fs25_planner}
      POSTGRES_USER: ${POSTGRES_USER:-fs25_planner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fs25_planner}
    volumes:
      # PostgreSQL 18 changed the recommended mount point: the volume goes at
      # /var/lib/postgresql (data lands in a versioned subdir), NOT
      # /var/lib/postgresql/data — the old path makes PG18 refuse to start.
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fs25_planner} -d ${POSTGRES_DB:-fs25_planner}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - fs25net
    # Sin "ports": no se expone fuera de la red interna en produccion.

  # ---------------------------------------------------------------------------
  # Redis 7 - broker de colas BullMQ (ADR-007: preparado, sin jobs en v1)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - fs25net
    # Sin "ports": no se expone fuera de la red interna en produccion.

  # ---------------------------------------------------------------------------
  # API - Fastify 5 + TypeScript (Node 22). Escucha en 0.0.0.0:3000 (interno).
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: ../api/.env
        required: false
    environment:
      NODE_ENV: production
      API_PORT: "3000"
      DATABASE_URL: postgres://${POSTGRES_USER:-fs25_planner}:${POSTGRES_PASSWORD:-fs25_planner}@postgres:5432/${POSTGRES_DB:-fs25_planner}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-prod-please-32chars-min}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-900}
      REFRESH_TOKEN_TTL_DAYS: ${REFRESH_TOKEN_TTL_DAYS:-30}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-10}
      ENABLE_TOKEN_CLEANUP: ${ENABLE_TOKEN_CLEANUP:-false}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    # Aplica migraciones + seed (idempotentes) y arranca el servidor.
    # dist/db/migrate.js y dist/db/seed.js se compilan desde src/db/*.ts en H2.
    command: ["sh", "-c", "node dist/db/migrate.js && node dist/db/seed.js && node dist/server.js"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # node:22-alpine no trae curl; usa wget (incluido en BusyBox de Alpine).
      # 127.0.0.1 (no "localhost"): localhost resuelve a ::1 (IPv6) primero y el
      # servidor escucha en 0.0.0.0 (IPv4), lo que daría connection refused.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - fs25net
    # Sin "ports": nginx hace de proxy hacia api:3000.

  # ---------------------------------------------------------------------------
  # Worker - mismo build que api, entrypoint distinto (BullMQ, ADR-007).
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: ../api
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["node", "dist/worker.js"]
    env_file:
      - path: ../api/.env
        required: false
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-fs25_planner}:${POSTGRES_PASSWORD:-fs25_planner}@postgres:5432/${POSTGRES_DB:-fs25_planner}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-prod-please-32chars-min}
      ENABLE_TOKEN_CLEANUP: ${ENABLE_TOKEN_CLEANUP:-false}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - fs25net

  # ---------------------------------------------------------------------------
  # nginx - proxy inverso + estaticos del build Nuxt (SPA). Unico servicio
  # que publica puertos. El build estatico se genera dentro de su Dockerfile.
  # ---------------------------------------------------------------------------
  nginx:
    build:
      context: ..
      dockerfile: docker/nginx/Dockerfile
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      # - "443:443"   # Descomentar al habilitar TLS (ver docker/nginx/nginx.conf).
    depends_on:
      api:
        condition: service_healthy
    networks:
      - fs25net

volumes:
  pgdata:
  redisdata:

networks:
  fs25net:
    driver: bridge
